<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>First Friday map | Board-Bored</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header class="glass-header">
        <h1>Bakersfield <span class="highlight">First Friday</span></h1>
        <p>Arts Council + BAA</p>
    </header>

    <!-- Main Content Area -->
    <main>
        <!-- Map View -->
        <section id="map-view" class="view-section active">
            <div id="map"></div>
            <div class="map-overlay">
                <button class="nav-btn btn-primary" onclick="switchView('hunt-view')">
                    🗺️ Go to Scavenger Hunt
                </button>
            </div>
        </section>

        <!-- Scavenger Hunt View -->
        <section id="hunt-view" class="view-section">
            <div class="hunt-header">
                <h2>The Arts <span class="highlight">Trail</span></h2>
                <p>Collect 5 stamps to unlock a free reward at the Arts Council!</p>
            </div>

            <div class="stamp-grid" id="stamp-grid">
                <!-- Stamps generated by JS -->
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p id="progress-text">0 / 5 Stamps</p>
            </div>

            <button class="nav-btn btn-secondary" onclick="switchView('map-view')">
                🔙 Back to Map
            </button>
        </section>
    </main>

    <!-- Reward Modal -->
    <div id="reward-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2>🎉 Reward Unlocked!</h2>
            <p>Show this screen to the front desk at the <strong>Arts Council of Kern</strong> to claim your prize.</p>
            <div class="qr-placeholder">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=board-bored-reward-12345&color=ffffff&bgcolor=2a2a2a"
                    alt="Reward QR">
            </div>
            <p class="claim-code">CODE: BAKE-ART-01</p>
            <button class="btn-primary" onclick="closeModal()">Close</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>

</html>
